# CogBench settings
cogbench:
  repository: "https://github.com/juliancodaforno/CogBench.git"
  reference_models:
    - "gpt-4"
    - "claude-2"

# Output settings
output:
  results_dir: "cogbench_results"
  logs_dir: "logs"
  analysis_dir: "analysis_output"
  plots_dir: "plots"
